<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reading List</title>
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Legacy PHP + Vanilla UI Practice</p>
        <h1>Reading List</h1>
        <p>
          Add books, update their reading status, and delete entries. The UI uses
          jQuery AJAX so the same behavior can later be mapped into React and Express.
        </p>
      </section>

      <section class="panel">
        <h2 id="form-title">Add a Book</h2>
        <form id="book-form">
          <input type="hidden" id="book-id" name="id">

          <div class="form-grid">
            <label>
              Title
              <input id="title" name="title" type="text" required>
            </label>

            <label>
              Author
              <input id="author" name="author" type="text" required>
            </label>

            <label>
              Status
              <select id="status" name="status">
                <option value="want_to_read">Want to read</option>
                <option value="reading">Reading</option>
                <option value="finished">Finished</option>
              </select>
            </label>

            <label>
              Rating
              <select id="rating" name="rating">
                <option value="">No rating yet</option>
                <option value="1">1 star</option>
                <option value="2">2 stars</option>
                <option value="3">3 stars</option>
                <option value="4">4 stars</option>
                <option value="5">5 stars</option>
              </select>
            </label>
          </div>

          <label>
            Notes
            <textarea id="notes" name="notes" rows="4"></textarea>
          </label>

          <p id="message" class="message" role="status"></p>

          <div class="actions">
            <button type="submit" id="submit-button">Save Book</button>
            <button type="button" id="cancel-edit" class="secondary" hidden>Cancel Edit</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="section-header">
          <h2>Books</h2>
          <button type="button" id="refresh-books" class="secondary">Refresh</button>
        </div>

        <div id="books" class="books" aria-live="polite"></div>
      </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/assets/app.js"></script>
  </body>
</html>
